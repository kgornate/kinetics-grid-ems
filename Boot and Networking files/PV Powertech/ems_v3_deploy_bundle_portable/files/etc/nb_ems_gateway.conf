# ==========================================================
# NorthBound EMS Gateway Auto-Start Configuration
# ==========================================================
# This file is installed to /etc/nb_ems_gateway.conf.
# It controls how nb-ems-gateway.service starts after Linux boot.

# Path where the northbound_ems_gateway codebase is copied on i.MX93.
NB_EMS_GATEWAY_DIR="/root/kinetics-grid-ems/northbound_ems_gateway"

# Python binary to use. Keep /usr/bin/python3 if dependencies are installed system-wide.
# If you later use a venv, change this to:
# /root/kinetics-grid-ems/northbound_ems_gateway/.venv/bin/python
NB_EMS_GATEWAY_PYTHON="/usr/bin/python3"

# Config used by the gateway.
# For current mock/testing mode, keep development.json.
# For real Chinese EMS field mode later, change to configs/actual_site.json.
NB_EMS_GATEWAY_CONFIG="configs/development.json"

# 1 = run in mock mode. 0 = real Modbus TCP mode.
# For field connection to actual Chinese EMS, set this to 0 and update the config file.
NB_EMS_GATEWAY_MOCK="0"

# API port expected by Cloudflare tunnel.
NB_EMS_GATEWAY_API_PORT="8000"

# Extra optional command-line arguments. Leave blank normally.
NB_EMS_GATEWAY_EXTRA_ARGS=""

# Startup log file for wrapper-level boot checks.
NB_EMS_GATEWAY_START_LOG="/var/log/nb_ems_gateway_start.log"

# Public Cloudflare API URL used only for status checks printed after login.
PUBLIC_API_URL="https://ems-api.unityess.cloud"

# Set to 0 if you do not want the login banner to print recent NorthBound logs.
SHOW_NB_LOG_ON_LOGIN="1"
