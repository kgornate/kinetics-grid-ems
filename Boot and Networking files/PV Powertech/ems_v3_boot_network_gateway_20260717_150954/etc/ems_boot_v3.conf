# ===== EMS Boot V3 minimal stack =====

# Field-side Ethernet
ETH1_IFACE="eth1"
ETH1_ADDR="192.168.100.2/24"
FIELD_TARGET_1="192.168.100.151"
FIELD_TARGET_2="192.168.100.153"

# Wi-Fi
WIFI_ENABLED="1"
WIFI_IFACE="mlan0"
WIFI_PRIMARY_SSID="bess_a#5"
WIFI_PRIMARY_PASSWORD="pb@12345"
WIFI_BACKUP_SSID="bess_a#5"
WIFI_BACKUP_PASSWORD="pb@12345"
WIFI_METRIC="10"

# DHCP / fallback
WIFI_DHCP_ATTEMPTS="3"
WIFI_DHCP_TIMEOUT_SEC="3"
WIFI_STATIC_FALLBACK_ENABLED="1"
WIFI_STATIC_ADDR="192.168.1.103/24"
WIFI_STATIC_GW="192.168.1.1"
DNS1="192.168.1.1"
DNS2="8.8.8.8"
DNS3="8.8.4.4"

# Cloudflare
CLOUDFLARE_ENABLED="1"

# SOC controller
SOC_CONTROLLER_ENABLED="1"
SOC_CONTROLLER_WORKDIR="/root/kinetics-grid-ems/northbound_ems_gateway"
SOC_CONTROLLER_CMD="/usr/bin/python3 /root/kinetics-grid-ems/northbound_ems_gateway/tools/soc_only_controller.py --config configs/soc_only_field_no_solar.json --live"

# Solis RTU
SOLIS_RTU_ENABLED="1"
SOLIS_RTU_PORT="/dev/ttyUSB0"
SOLIS_RTU_LINK="/dev/ems_solis_rtu"
SOLIS_RTU_BAUD="9600"
SOLIS_RTU_UNIT_ID="1"
SOLIS_RTU_BOOT_READ="0"
