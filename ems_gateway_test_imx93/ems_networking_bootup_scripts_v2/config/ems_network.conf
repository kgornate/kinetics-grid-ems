# ==========================================================
# EMS Gateway Network Configuration - NorthBound/Cloudflare Mode
# ==========================================================
# Interface roles:
#   eth1  = field-side device network: Chinese EMS or external PCS
#   eth0  = application-side: direct PC/Flutter OR LAN Ethernet internet
#   mlan0 = Wi-Fi internet fallback/primary, same as current working setup
#
# Remote monitoring model:
#   NorthBound Gateway runs local API on port 8000.
#   cloudflared exposes localhost:8000 through Cloudflare.
#   Cloudflare uses whichever Linux default internet route is active.
# ==========================================================

# ---------------- eth0 application side ----------------
# direct_pc  : static 192.168.10.2/24 for PC/Flutter at 192.168.10.1
# lan_dhcp   : DHCP from LAN/router, can provide internet
# auto       : try DHCP first; if no DHCP, fall back to direct_pc static
ETH0_MODE="auto"
ETH0_IFACE="eth0"
ETH0_DIRECT_IP="192.168.10.2/24"
ETH0_DIRECT_PEER_IP="192.168.10.1"
ETH0_DHCP_TIMEOUT_SEC="10"
ETH0_METRIC="100"

# ---------------- eth1 field side ----------------
ETH1_IFACE="eth1"
ETH1_FIELD_IP="192.168.100.2/24"
# Keep both possible field targets for status checks.
# Change/add the Chinese EMS IP here after vendor confirmation.
FIELD_TARGET_IPS="192.168.100.151 192.168.100.153"

# ---------------- Wi-Fi internet side ----------------
WIFI_ENABLED="1"
WIFI_IFACE="mlan0"
WIFI_CONFIG_COUNTRY="IN"
WIFI_METRIC="200"
DNS_TEST_IP="8.8.8.8"

# Primary Wi-Fi credentials preserved from existing EMS network package.
WIFI_PRIMARY_SSID="bess_a#5"
WIFI_PRIMARY_PASSWORD="pb@12345"

# Optional backup Wi-Fi. Leave blank if not needed.
WIFI_BACKUP_SSID="OnePlus 13s CF94"
WIFI_BACKUP_PASSWORD="Finland@12"

# ---------------- Cloudflare/local API checks ----------------
CLOUDFLARED_ENABLED="1"
RESTART_CLOUDFLARED_AFTER_NETWORK="1"
LOCAL_API_PORT="8000"
LOCAL_LOGS_PORT="7000"

# ---------------- Logging ----------------
LOG_FILE="/var/log/ems_network_setup.log"

# ---------------- Wi-Fi robustness tuning ----------------
# These keep boot reasonable while fixing intermittent DHCP/association timing.
WIFI_IFACE_WAIT_ATTEMPTS="30"
WIFI_CONNECT_ATTEMPTS="12"
WIFI_CONNECT_SLEEP_SEC="2"
WIFI_DHCP_ATTEMPTS="3"
WIFI_DHCP_TRIES_PER_ATTEMPT="5"
WIFI_DHCP_TIMEOUT_SEC="2"

# Static fallback is disabled by default. Enable only if router DHCP remains flaky
# and a fixed router-side reservation exists for the i.MX93 Wi-Fi MAC.
WIFI_STATIC_FALLBACK_ENABLED="0"
WIFI_STATIC_IP="192.168.1.100/24"
WIFI_STATIC_GATEWAY="192.168.1.1"

# ---------------- Solis inverter Modbus RTU side ----------------
# Solis is connected through USB-RS485 and controlled by the SOC + Solis controller.
# The boot setup creates a stable symlink so gateway config should use /dev/ems_solis_rtu,
# not a changing /dev/ttyUSBx name.
SOLIS_RTU_ENABLED="1"
SOLIS_RTU_PORT="/dev/ttyUSB1"
SOLIS_RTU_STABLE_LINK="/dev/ems_solis_rtu"
SOLIS_RTU_BAUDRATE="9600"
SOLIS_RTU_DATABITS="8"
SOLIS_RTU_PARITY="N"
SOLIS_RTU_STOPBITS="1"
SOLIS_RTU_UNIT_ID="1"
SOLIS_RTU_TIMEOUT_SEC="3"
SOLIS_RTU_WAIT_ATTEMPTS="20"
SOLIS_RTU_WAIT_SLEEP_SEC="1"
SOLIS_RTU_REQUIRED="0"
SOLIS_RTU_BOOT_READ_TEST="1"
SOLIS_RTU_CONTROL_METHOD="holding_onoff_3007"

# Patch the v1.7 SOC + Solis controller config at boot so it uses the stable RTU link.
SOLIS_RTU_PATCH_GATEWAY_CONFIG="1"
SOC_SOLIS_GATEWAY_CONFIG="/root/kinetics-grid-ems/northbound_ems_gateway/configs/soc_solis_field_rtu.json"
